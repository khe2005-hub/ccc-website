<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlsbad Chinese Club (CCC) - 聖地亞哥北郡華人協會</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1d4ed8 100%); }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
<div id="root"></div>

<script type="text/javascript">
const { useState, useEffect, createElement: h } = React;

/* ── Inline SVG Icons ── */
const Icon = ({ d, className = "w-6 h-6", strokeWidth = 2 }) => (
  h('svg', { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth, strokeLinecap: "round", strokeLinejoin: "round", className }, d)
);

const Icons = {
  Users: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" }), h('circle', { cx: "9", cy: "7", r: "4" }), h('path', { d: "M23 21v-2a4 4 0 0 0-3-3.87" }), h('path', { d: "M16 3.13a4 4 0 0 1 0 7.75" })) }),
  Map: h(Icon, { d: h(React.Fragment, null, h('polygon', { points: "3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" }), h('line', { x1: "9", y1: "3", x2: "9", y2: "18" }), h('line', { x1: "15", y1: "6", x2: "15", y2: "21" })) }),
  Music: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M9 18V5l12-2v13" }), h('circle', { cx: "6", cy: "18", r: "3" }), h('circle', { cx: "18", cy: "16", r: "3" })) }),
  Trophy: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M6 9H4.5a2.5 2.5 0 0 1 0-5H6" }), h('path', { d: "M18 9h1.5a2.5 2.5 0 0 0 0-5H18" }), h('path', { d: "M4 22h16" }), h('path', { d: "M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" }), h('path', { d: "M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" }), h('path', { d: "M18 2H6v7a6 6 0 0 0 12 0V2z" })) }),
  Calendar: h(Icon, { d: h(React.Fragment, null, h('rect', { x: "3", y: "4", width: "18", height: "18", rx: "2", ry: "2" }), h('line', { x1: "16", y1: "2", x2: "16", y2: "6" }), h('line', { x1: "8", y1: "2", x2: "8", y2: "6" }), h('line', { x1: "3", y1: "10", x2: "21", y2: "10" })) }),
  Camera: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" }), h('circle', { cx: "12", cy: "13", r: "4" })) }),
  Mail: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" }), h('polyline', { points: "22,6 12,13 2,6" })) }),
  Menu: h(Icon, { d: h(React.Fragment, null, h('line', { x1: "3", y1: "12", x2: "21", y2: "12" }), h('line', { x1: "3", y1: "6", x2: "21", y2: "6" }), h('line', { x1: "3", y1: "18", x2: "21", y2: "18" })) }),
  X: h(Icon, { d: h(React.Fragment, null, h('line', { x1: "18", y1: "6", x2: "6", y2: "18" }), h('line', { x1: "6", y1: "6", x2: "18", y2: "18" })) }),
  ChevronRight: h(Icon, { d: h('polyline', { points: "9 18 15 12 9 6" }) }),
  MapPin: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" }), h('circle', { cx: "12", cy: "10", r: "3" })) }),
  Lock: h(Icon, { d: h(React.Fragment, null, h('rect', { x: "3", y: "11", width: "18", height: "11", rx: "2", ry: "2" }), h('path', { d: "M7 11V7a5 5 0 0 1 10 0v4" })) }),
  Upload: h(Icon, { d: h(React.Fragment, null, h('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }), h('polyline', { points: "17 8 12 3 7 8" }), h('line', { x1: "12", y1: "3", x2: "12", y2: "15" })) }),
};

/* ── Static Context Data ── */
const EVENTS = [
  { id: 1, title: "Autumn Tango Performance Prep", zhTitle: "秋季探戈表演排練", date: "August 15, 2026 · 10:00 AM", location: "Calavera Community Center", type: "Rehearsal" },
  { id: 2, title: "Quarterly Association Assembly", zhTitle: "季度會員大會", date: "August 26, 2026 · 11:00 AM", location: "Calavera Community Center", type: "Meeting" }
];

const MOCK_DIRECTORY = [
  { id: 1, nameEn: "John Doe", nameZh: "張三", partner: "Jane Doe", email: "john@example.com", phone: "(760) 555-0101", address: "123 Coastal Hwy, Carlsbad, CA" },
  { id: 2, nameEn: "Alice Wong", nameZh: "王小明", partner: "Bob Wong", email: "alice@example.com", phone: "(760) 555-0202", address: "456 Inland Dr, San Marcos, CA" }
];

/* ── UI Sub-components ── */
const NavItem = ({ name, zhName, id, currentPage, setCurrentPage, setIsMenuOpen }) => {
  const isActive = currentPage === id;
  return h('button', {
    onClick: () => { setCurrentPage(id); setIsMenuOpen(false); },
    className: `px-4 py-2 text-left font-medium flex flex-col items-start md:items-center transition-all rounded-xl w-full md:w-auto ${
      isActive ? 'text-blue-600 bg-blue-50/80 font-semibold' : 'text-slate-600 hover:text-blue-600 hover:bg-slate-50'
    }`
  }, [
    h('span', { key: 'en', className: "text-sm flex items-center gap-1" }, [id === 'admin' && h('span', {className: "w-3 h-3 text-amber-500"}, Icons.Lock), name]),
    h('span', { key: 'zh', className: "text-xs opacity-75 hidden md:inline" }, zhName)
  ]);
};

/* ── Pages ── */
const HomePage = ({ setCurrentPage }) => {
  return h('div', { className: "fade-in" }, [
    h('section', { key: 'hero', className: "hero-bg text-white py-24 px-4 text-center relative overflow-hidden" }, [
      h('div', { className: "max-w-4xl mx-auto relative z-10" }, [
        h('span', { className: "bg-blue-500/30 text-blue-200 text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-full backdrop-blur-sm border border-blue-400/20" }, "Welcome to Carlsbad Chinese Club"),
        h('h1', { className: "text-4xl md:text-6xl font-black tracking-tight mt-6 leading-tight" }, "Connecting Community, Sharing Cultures"),
        h('p', { className: "text-3xl md:text-4xl font-medium text-blue-100 mt-2 font-serif" }, "聖地亞哥北郡華人協會"),
        h('div', { className: "mt-10 flex flex-wrap gap-4 justify-center" }, [
          h('button', { onClick: () => setCurrentPage('contact'), className: "bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-xl shadow-xl transition-all" }, "Join Association / 申請加入")
        ])
      ])
    ]),
    
    // NEW: Upcoming Events Section
    h('section', { key: 'events', className: "max-w-4xl mx-auto px-4 -mt-8 relative z-20" }, [
      h('div', { className: "bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-8" }, [
        h('div', { className: "flex items-center gap-3 mb-6 border-b border-slate-100 pb-4" }, [
          h('div', { className: "text-blue-600 bg-blue-50 p-2 rounded-lg" }, Icons.Calendar),
          h('h2', { className: "text-xl font-bold text-slate-900" }, "Upcoming Events / 最新活動")
        ]),
        h('div', { className: "space-y-4" }, EVENTS.map(ev => 
          h('div', { key: ev.id, className: "flex flex-col md:flex-row justify-between md:items-center p-4 rounded-xl border border-slate-100 hover:border-blue-200 hover:bg-blue-50/30 transition-colors" }, [
            h('div', null, [
              h('div', { className: "flex items-center gap-2" }, [
                h('span', { className: "text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-100 px-2 py-0.5 rounded" }, ev.type),
                h('h4', { className: "font-bold text-slate-900" }, ev.title)
              ]),
              h('p', { className: "text-sm text-slate-500 font-serif mt-1" }, ev.zhTitle)
            ]),
            h('div', { className: "mt-3 md:mt-0 text-left md:text-right" }, [
              h('p', { className: "text-sm font-semibold text-slate-700" }, ev.date),
              h('p', { className: "text-xs text-slate-500 mt-0.5 flex items-center md:justify-end gap-1" }, [Icons.MapPin, ev.location])
            ])
          ])
        ))
      ])
    ])
  ]);
};

// NEW: Admin Portal Page
const AdminPage = () => {
  const [activeTab, setActiveTab] = useState('directory');
  const [isAuthorized, setIsAuthorized] = useState(false);
  const [password, setPassword] = useState('');

  if (!isAuthorized) {
    return h('div', { className: "max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-lg border border-slate-100 fade-in text-center" }, [
      h('div', { className: "mx-auto w-12 h-12 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center mb-4" }, Icons.Lock),
      h('h2', { className: "text-xl font-bold mb-2" }, "Admin Portal Access"),
      h('p', { className: "text-sm text-slate-500 mb-6" }, "Please enter the administrative password to manage the directory and send notifications."),
      h('form', { onSubmit: (e) => { e.preventDefault(); if(password === 'cccadmin') setIsAuthorized(true); else alert('Incorrect password for mockup. Try "cccadmin"'); } }, [
        h('input', { type: "password", value: password, onChange: e => setPassword(e.target.value), className: "w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 text-center", placeholder: "Enter Password" }),
        h('button', { type: "submit", className: "w-full bg-slate-900 text-white font-bold py-3 rounded-xl" }, "Unlock Portal")
      ])
    ]);
  }

  return h('div', { className: "max-w-6xl mx-auto px-4 py-12 fade-in" }, [
    h('div', { className: "flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4" }, [
      h('div', null, [
        h('h2', { className: "text-3xl font-black tracking-tight flex items-center gap-3" }, [Icons.Lock, "CCC Command Center"]),
        h('p', { className: "text-slate-500 mt-1" }, "Manage directory, broadcast emails, and upload assets securely.")
      ]),
      h('div', { className: "flex bg-slate-100 p-1 rounded-xl" }, [
        ['directory', 'Directory'].map(([id, label]) => 
          h('button', { key: id, onClick: () => setActiveTab(id), className: `px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}` }, label)
        ),
        ['email', 'Broadcast Email'].map(([id, label]) => 
          h('button', { key: id, onClick: () => setActiveTab(id), className: `px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}` }, label)
        ),
        ['upload', 'File Upload'].map(([id, label]) => 
          h('button', { key: id, onClick: () => setActiveTab(id), className: `px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}` }, label)
        )
      ])
    ]),

    // Tab: Directory
    activeTab === 'directory' && h('div', { className: "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in" }, [
      h('div', { className: "overflow-x-auto" }, [
        h('table', { className: "w-full text-left text-sm" }, [
          h('thead', { className: "bg-slate-50 border-b border-slate-200 text-slate-600 uppercase tracking-wider text-xs font-bold" }, 
            h('tr', null, ['Name (En)', 'Name (Zh)', 'Partner', 'Email', 'Phone', 'Home Address'].map(head => h('th', { key: head, className: "p-4" }, head)))
          ),
          h('tbody', { className: "divide-y divide-slate-100" }, MOCK_DIRECTORY.map(m => 
            h('tr', { key: m.id, className: "hover:bg-slate-50/50" }, [
              h('td', { className: "p-4 font-semibold text-slate-900" }, m.nameEn),
              h('td', { className: "p-4 font-serif" }, m.nameZh),
              h('td', { className: "p-4 text-slate-600" }, m.partner),
              h('td', { className: "p-4 text-blue-600" }, m.email),
              h('td', { className: "p-4 text-slate-600" }, m.phone),
              h('td', { className: "p-4 text-slate-500 text-xs" }, m.address),
            ])
          ))
        ])
      ])
    ]),

    // Tab: Broadcast Email
    activeTab === 'email' && h('div', { className: "bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in max-w-3xl" }, [
      h('div', { className: "space-y-6" }, [
        h('div', null, [
          h('label', { className: "block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" }, "Recipient Group"),
          h('select', { className: "w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" }, [
            h('option', null, "All Active Members (2)"), h('option', null, "Hiking Group Only"), h('option', null, "Board Members Only")
          ])
        ]),
        h('div', null, [
          h('label', { className: "block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" }, "Subject Line"),
          h('input', { type: "text", className: "w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm", placeholder: "e.g., Upcoming Gala Rehearsal Notification" })
        ]),
        h('div', null, [
          h('label', { className: "block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" }, "Message Body"),
          h('textarea', { rows: 6, className: "w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm resize-none" })
        ]),
        h('button', { onClick: () => alert('Mockup: In production, this will trigger a Google Apps Script Mail Merge via your Gmail account.'), className: "bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center gap-2" }, [Icons.Mail, "Send Broadcast Email"])
      ])
    ]),

    // Tab: File Upload
    activeTab === 'upload' && h('div', { className: "bg-white rounded-2xl shadow-sm border border-slate-200 p-12 text-center fade-in border-dashed border-2" }, [
      h('div', { className: "w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4" }, Icons.Upload),
      h('h3', { className: "text-lg font-bold text-slate-900" }, "Upload Event Assets"),
      h('p', { className: "text-sm text-slate-500 mt-2 mb-6 max-w-md mx-auto" }, "Select photos or documents to upload. Files will be securely routed to the CCC Administrative Google Drive."),
      h('input', { type: "file", className: "hidden", id: "file-upload" }),
      h('label', { htmlFor: "file-upload", className: "cursor-pointer bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3 px-6 rounded-xl inline-block" }, "Browse Files")
    ])
  ]);
};

/* ── Shell Entry Core (Trimmed for brevity) ── */
const App = () => {
  const [currentPage, setCurrentPage] = useState('home');
  const [isMenuOpen, setIsMenuOpen] = useState(false);

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'auto' }); }, [currentPage]);

  const navProps = { currentPage, setCurrentPage, setIsMenuOpen };
  const navLinks = [
    { name: "Home", zhName: "首頁", id: "home" },
    { name: "Contact", zhName: "聯繫我們", id: "contact" },
    { name: "Admin Portal", zhName: "管理後台", id: "admin" } // NEW LINK
  ];

  return h('div', { className: "min-h-screen flex flex-col justify-between bg-slate-50" }, [
    h('nav', { className: "bg-white border-b border-slate-200/80 sticky top-0 z-50 backdrop-blur-md bg-white/95" }, [
      h('div', { className: "max-w-6xl mx-auto px-4" }, [
        h('div', { className: "flex justify-between items-center h-20" }, [
          h('div', { onClick: () => setCurrentPage('home'), className: "flex items-center gap-3 cursor-pointer" }, [
            h('div', { className: "bg-blue-600 p-2.5 rounded-xl text-white" }, Icons.Users),
            h('div', { className: "flex flex-col" }, [
              h('span', { className: "text-base font-black tracking-tight text-slate-900 uppercase" }, "Carlsbad Chinese Club")
            ])
          ]),
          h('div', { className: "hidden md:flex items-center gap-1" }, navLinks.map(l => h(NavItem, { key: l.id, ...l, ...navProps })))
        ])
      ])
    ]),
    h('main', { className: "flex-grow" }, [
      currentPage === 'home'  && h(HomePage, { setCurrentPage }),
      currentPage === 'admin' && h(AdminPage)
    ].filter(Boolean))
  ]);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
